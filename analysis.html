<style>:root{--line:#e3e8ee;--mut:#5f6b7a;--ok:#137333;--warn:#b06000}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,'Malgun Gothic',sans-serif;background:#f4f6f9;color:#1a2330;line-height:1.6}
.wrap{max-width:920px;margin:0 auto;padding:0 16px 60px}
header{background:linear-gradient(135deg,#0b4f6c,#1a73e8);color:#fff;padding:30px 24px;border-radius:0 0 18px 18px}
header h1{margin:0 0 6px;font-size:24px}header .sub{opacity:.92;font-size:14px}header .meta{margin-top:12px;font-size:12px;opacity:.85;border-top:1px solid rgba(255,255,255,.25);padding-top:9px}
h2{font-size:19px;color:#0b4f6c;border-left:5px solid #1a73e8;padding-left:11px;margin:30px 0 12px}h3{font-size:15px;margin:14px 0 6px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin:12px 0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.concl{background:#e8f0fe;border:1px solid #c5d9f8;border-radius:12px;padding:16px 18px;margin:14px 0}.concl b{color:#0b4f6c}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:8px 9px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
th{background:#f0f4f9;color:#33414f;font-size:12px}td.num{text-align:right}td.nm{font-weight:700}td.sc{text-align:right;font-weight:700;color:#1a73e8}
ul{margin:0;padding-left:17px}li{margin:3px 0}ul.pro li{color:#137333}ul.con li{color:#b06000}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;margin-right:4px}.p-ok{background:#e6f4ea;color:#137333}.p-warn{background:#fef7e0;color:#b06000}
.kv{display:grid;grid-template-columns:130px 1fr;gap:4px 12px;font-size:13px}.kv b{color:#33414f}
#map{height:360px;border-radius:10px}#trend{height:320px}
.small{font-size:11.5px;color:var(--mut)}.leg{font-size:12px;color:var(--mut);margin-top:6px}.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 3px 0 10px}
.warnbox{background:#fef7e0;border:1px solid #f9e3a0;border-radius:10px;padding:11px 15px;font-size:13px}
.foot{margin-top:26px;font-size:11px;color:var(--mut);border-top:1px solid var(--line);padding-top:12px}a.home{color:#cfe3ff;text-decoration:none}</style>
<style>#lock{position:fixed;inset:0;background:linear-gradient(135deg,#0b4f6c,#1a73e8);display:flex;align-items:center;justify-content:center;z-index:99999;font-family:-apple-system,'Malgun Gothic',sans-serif}#lockbox{background:#fff;border-radius:16px;padding:30px 28px;width:300px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3)}#lockbox h3{margin:0 0 6px;color:#0b4f6c}#lockbox p{font-size:12px;color:#5f6b7a;margin:0 0 16px}#pw{width:100%;padding:11px;font-size:18px;text-align:center;letter-spacing:6px;border:2px solid #d0d8e2;border-radius:10px;outline:none}#pw:focus{border-color:#1a73e8}#go{margin-top:12px;width:100%;padding:11px;background:#1a73e8;color:#fff;border:0;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}#err{color:#c5221f;font-size:12px;margin-top:8px;min-height:16px}</style></head>

async function unlock(pw){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);const k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:SALT,iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:IV},k,CT);return new TextDecoder().decode(pt);}
async function go(){try{const html=await unlock(document.getElementById('pw').value.trim());const app=document.getElementById('app');app.innerHTML=html;app.querySelectorAll('script').forEach(o=>{const s=document.createElement('script');if(o.src)s.src=o.src;else s.textContent=o.textContent;document.body.appendChild(s);});document.getElementById('lock').style.display='none';}catch(e){document.getElementById('err').textContent='비밀번호가 틀렸습니다';document.getElementById('pw').value='';}}
document.getElementById('go').onclick=go;document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
</script></body></html>
