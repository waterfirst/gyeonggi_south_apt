<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서울 아파트 실거래가 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<!-- 헤더 -->
<header>
  <div>
    <h1>🏙️ 서울 아파트 실거래가 <span>25억 이하 · 84㎡ 이상</span></h1>
  </div>
  <div class="header-meta">
    <span id="sample-badge" class="sample-badge" style="display:none;">샘플 데이터</span>
    <div id="updated-at">업데이트: 로딩 중...</div>
  </div>
</header>

<div class="container">

  <!-- 요약 카드 -->
  <div class="summary-cards">
    <div class="summary-card">
      <div class="value" id="sum-total">-</div>
      <div class="label">총 거래 건수</div>
    </div>
    <div class="summary-card">
      <div class="value" id="sum-avg">-</div>
      <div class="label">평균 거래가</div>
    </div>
    <div class="summary-card">
      <div class="value" id="sum-min">-</div>
      <div class="label">최저 거래가</div>
    </div>
    <div class="summary-card">
      <div class="value" id="sum-max">-</div>
      <div class="label">최고 거래가</div>
    </div>
    <div class="summary-card">
      <div class="value" id="sum-gu">-</div>
      <div class="label">거래 발생 구</div>
    </div>
  </div>

  <!-- 필터 패널 -->
  <div class="filter-panel">
    <h2>🔍 필터</h2>
    <div class="filter-grid">
      <div class="filter-group">
        <label>구 선택</label>
        <select id="filter-gu">
          <option value="">전체 구</option>
        </select>
      </div>
      <div class="filter-group">
        <label>최대 거래가</label>
        <div class="range-row">
          <input type="range" id="slider-max" min="10" max="25" step="1" value="25">
          <span class="range-val" id="val-max">25억</span>
        </div>
      </div>
      <div class="filter-group">
        <label>최소 거래가</label>
        <div class="range-row">
          <input type="range" id="slider-min" min="5" max="25" step="1" value="10">
          <span class="range-val" id="val-min">10억</span>
        </div>
      </div>
      <div class="filter-group">
        <label>최소 전용면적</label>
        <div class="range-row">
          <input type="range" id="slider-area" min="84" max="200" step="1" value="84">
          <span class="range-val" id="val-area">84㎡~</span>
        </div>
      </div>
      <div class="filter-group">
        <label>건축연도 이후</label>
        <select id="filter-year">
          <option value="">전체</option>
          <option value="2010">2010년 이후</option>
          <option value="2015">2015년 이후</option>
          <option value="2018">2018년 이후</option>
          <option value="2020">2020년 이후</option>
        </select>
      </div>
      <div class="filter-group">
        <label>&nbsp;</label>
        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="toggle-hangang">
            <span class="slider"></span>
          </label>
          <label for="toggle-hangang">한강 인근만</label>
        </div>
      </div>
      <div class="filter-group" style="display:flex;flex-direction:column;justify-content:flex-end;">
        <button class="btn-reset" id="btn-reset">초기화</button>
      </div>
    </div>
  </div>

  <!-- 구별 카드 -->
  <div class="district-cards-section">
    <h2>구별 거래 현황 <small style="font-size:12px;font-weight:400;color:#5f6368">— 카드 클릭 시 해당 구 필터</small></h2>
    <div class="district-cards" id="district-cards"></div>
  </div>

  <!-- 차트 -->
  <div class="charts-grid">
    <div class="chart-card">
      <h3>구별 평균 거래가</h3>
      <div class="chart-wrap"><canvas id="chart-bar"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>월별 거래량 추이</h3>
      <div class="chart-wrap"><canvas id="chart-line"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>면적대별 거래 분포</h3>
      <div class="chart-wrap"><canvas id="chart-area"></canvas></div>
    </div>
  </div>

  <!-- 거래 테이블 -->
  <div class="table-section">
    <div class="table-header">
      <h2>거래 내역 <span class="table-count" id="table-count"></span></h2>
      <input type="text" class="search-box" id="filter-search" placeholder="단지명 검색...">
    </div>
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th data-key="단지명">단지명 <span class="sort-icon">↕</span></th>
              <th data-key="구">구 <span class="sort-icon">↕</span></th>
              <th data-key="법정동">동 <span class="sort-icon">↕</span></th>
              <th data-key="전용면적">면적 <span class="sort-icon">↕</span></th>
              <th data-key="층">층 <span class="sort-icon">↕</span></th>
              <th data-key="건축연도">건축연도 <span class="sort-icon">↕</span></th>
              <th data-key="거래금액" class="sorted">거래금액 <span class="sort-icon">↓</span></th>
              <th data-key="거래일">거래일 <span class="sort-icon">↕</span></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="8" style="text-align:center;padding:40px;color:#999">데이터 로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

</div>

<!-- 모달 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="./js/dashboard.js"></script>
</body>
</html>
